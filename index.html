<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turkers LINE 入口</title>
    <link rel="stylesheet" href="./styles.css" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QRWLVY7C89"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-QRWLVY7C89");
    </script>
  </head>
  <body>
    <main class="page">
      <p id="sales" class="sales-banner" hidden></p>
      <section class="grid" aria-label="LINE 官方帳號入口">
        <a
          class="card"
          data-country="vietnam"
          href="https://line.me/R/ti/p/@046hgxyf?oat_content=url&ts=03090234"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="前往越南 LINE 官方帳號"
        >
          <img src="./assets/vietnam.png" alt="越南問卷圖片" />
        </a>

        <a
          class="card"
          data-country="indonesia"
          href="https://line.me/R/ti/p/@913dqslp?oat_content=url&ts=03090235"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="前往印尼 LINE 官方帳號"
        >
          <img src="./assets/indonesia.png" alt="印尼問卷圖片" />
        </a>

        <a
          class="card"
          data-country="thailand"
          href="https://line.me/R/ti/p/@913dqslp?ts=03090234&oat_content=url"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="前往泰國 LINE 官方帳號"
        >
          <img src="./assets/thailand.png" alt="泰國問卷圖片" />
        </a>

        <a
          class="card"
          data-country="philippines"
          href="https://line.me/R/ti/p/@448tfews?ts=03090233&oat_content=url"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="前往菲律賓 LINE 官方帳號"
        >
          <img src="./assets/philippines.png" alt="菲律賓問卷圖片" />
        </a>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const sales = params.get("utm_content");
      const salesElement = document.getElementById("sales");

      if (sales) {
        salesElement.hidden = false;
        salesElement.textContent = "業務專員：" + sales;

        gtag("event", "sales_visit", {
          sales_name: sales,
        });
      }

      const cards = document.querySelectorAll(".card");

      cards.forEach((card) => {
        card.addEventListener("click", (e) => {
          if (!sales) return;

          e.preventDefault(); // 🔥 阻止立即跳轉

          const country = card.dataset.country;

          fetch(
            "https://script.google.com/macros/s/AKfycbzYyUyAFiobPHG2J24G25Ojth81qfQ_Cx0xpamF84OW0_YHZXxVVp_rHQ05SYD_lziZQA/exec",
            {
              method: "POST",
              mode: "no-cors", // 🔥 解決 CORS
              body: JSON.stringify({
                sales: sales,
                country: country,
              }),
            }
          );

          // 🔥 延遲跳轉（讓 request 有時間送出）
          setTimeout(() => {
            window.open(card.href, "_blank");
          }, 300);
        });
      });
    </script>
  </body>
</html>
